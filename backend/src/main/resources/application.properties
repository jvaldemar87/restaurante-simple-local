server.port=8080
server.forward-headers-strategy=framework

# SQLite
spring.datasource.url=jdbc:sqlite:/app/data/restaurante.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=com.restaurante.config.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=/app/uploads
app.backup.dir=/app/respaldos

# CORS (separar múltiples orígenes con coma: https://a.com,https://b.com)
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# JWT
app.jwt.secret=${JWT_SECRET:changeme}
app.jwt.expiration-ms=43200000
