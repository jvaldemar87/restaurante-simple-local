services:
  restaurante-app:
    build: .
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./docker-data/db:/app/data
      - ./docker-data/uploads:/app/uploads
      - ./docker-data/respaldos:/app/respaldos
    environment:
      - TZ=America/Mexico_City
      - CORS_ORIGINS=*
      - JWT_SECRET=cambia-esta-clave-por-una-secreta
